# gostforge REST API — пример docker-compose для production.
#
# Использование:
#   1. Скопируйте .env.example в .env и заполните ключи / origins.
#   2. docker compose up -d
#   3. curl -H "X-API-Key: ${GOSTFORGE_API_KEYS}" http://localhost:8000/health
#
# Для публичного интернета поставьте перед сервисом nginx/Caddy с
# TLS-терминированием и rate-limiting'ом.

services:
  api:
    build: .
    image: gostforge:latest
    container_name: gostforge-api
    restart: unless-stopped
    ports:
      - "${GOSTFORGE_BIND:-127.0.0.1}:8000:8000"
    environment:
      # Ключи через .env (см. .env.example).
      GOSTFORGE_API_KEYS: "${GOSTFORGE_API_KEYS:-}"
      GOSTFORGE_CORS_ORIGINS: "${GOSTFORGE_CORS_ORIGINS:-}"
      GOSTFORGE_MAX_UPLOAD_MB: "${GOSTFORGE_MAX_UPLOAD_MB:-25}"
      # Локальная БД (история проверок). Volume ниже сохраняет её между
      # перезапусками контейнера.
      GOSTFORGE_DB_PATH: /var/lib/gostforge/gostforge.db
    volumes:
      - gostforge-data:/var/lib/gostforge
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Лимит ресурсов — на случай вредных запросов.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    image: gostforge-ui:latest
    container_name: gostforge-ui
    restart: unless-stopped
    ports:
      - "${GOSTFORGE_UI_BIND:-127.0.0.1}:8501:8501"
    # Streamlit-UI не требует API-ключей (он сам пользователь, не сервер).
    # Защищать его в публичной сети — задача reverse-proxy (basic auth /
    # OAuth2-proxy перед сервисом).
    environment:
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # Сохраняем autosave-конструктора между перезапусками контейнера.
    volumes:
      - gostforge-autosave:/home/gostforge/.gostforge
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M

volumes:
  gostforge-data:
  gostforge-autosave:
