# Образец кафедрального профиля для curso work факультета ВМК МГУ.
# Используется как пример «маркетплейса профилей» — реальные параметры
# могут отличаться, проверяйте методичку своей кафедры.

id: msu-vmk-coursework
name: МГУ ВМК — курсовая работа
version: "1.0"
extends: gost-7.32-2017
description: |
  Профиль для курсовых работ факультета ВМК МГУ. Особенности относительно
  базового ГОСТ 7.32-2017:

  - кегль основного текста 14 (как у базового), но междустрочный интервал 1.0
    (вместо 1.5);
  - отступ первой строки 1.25 см;
  - нумерация со страницы 4 (титул + содержание + введение);
  - обязательный набор разделов расширен «Постановкой задачи».

  Источник: иллюстративный, реальные требования уточняйте у научного
  руководителя.

styles:
  body:
    line_spacing: 1.0
    first_line_indent_cm: 1.25
  page:
    page_numbering:
      start_value: 4

checks:
  S.01:
    enabled: true
    severity: error
    params:
      required_headings:
        - Введение
        - Постановка задачи
        - Основная часть
        - Заключение
        - Список использованных источников
