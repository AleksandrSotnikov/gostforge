# Пример пользовательского профиля кафедры, наследующего от базового.
# Имя файла = ID профиля. Чтобы использовать: gostforge check work.docx -p example-department.

id: example-department
name: Кафедра-пример (методичка 2026)
version: "1.0"
extends: gost-7.32-2017
description: |
  Иллюстративный профиль кафедры. Показывает типовые переопределения:
  более мелкий кегль 12, отступ 1.0 см вместо 1.25, нумерация со
  страницы 4 (после титула, задания и реферата), увеличенный список
  обязательных разделов, минимум 30 источников.

  Используется как образец при создании собственных профилей кафедр.

styles:
  body:
    size_pt: 12
    first_line_indent_cm: 1.0

checks:
  # Размеры кеглей основного текста, подписей и сносок.
  T.02:
    enabled: true
    params:
      body_size: 12
      caption_size: 11
      footnote_size: 10

  # Отступ красной строки переопределяется под кафедральный стандарт.
  T.04:
    enabled: true
    params:
      first_line_indent_cm: 1.0

  # Дополнительные обязательные разделы кафедры: реферат и приложения.
  S.01:
    enabled: true
    params:
      required_headings:
        - Реферат
        - Введение
        - Заключение
        - Список использованных источников

  # Видимая нумерация начинается с четвёртой страницы (титул + задание + реферат).
  F.06:
    enabled: true
    params:
      start_value: 4

  # Послабления для R.04 на этапе пилота: точку в конце требуем,
  # маркер «URL:» для web-записей пока опционален.
  R.04:
    enabled: true
    params:
      min_length: 20
      require_year: true
      require_final_dot: true
      require_separator: true
      require_url_marker_for_web: false

  # Минимальное число источников (проверка пока в roadmap'е, R.11 — Фаза 2).
  R.11:
    enabled: true
    params:
      min_sources: 30
