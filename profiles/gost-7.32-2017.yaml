id: gost-7.32-2017
name: ГОСТ 7.32-2017 (базовый)
version: "1.0"
based_on:
  - "ГОСТ 7.32-2017"
  - "ГОСТ Р 2.105-2019"
  - "ГОСТ Р 7.0.100-2018"
effective_from: "2018-07-01"
description: |
  Базовый профиль для отчётов о научно-исследовательской работе, курсовых
  и дипломных работ. Параметры — общие требования ГОСТ 7.32-2017.
  Кафедры наследуют от этого профиля и переопределяют отдельные поля
  в соответствии со своими методичками.

styles:
  page:
    size: A4
    margins_mm:
      top: 20
      right: 15
      bottom: 20
      left: 30
  body:
    font: Times New Roman
    size_pt: 14
    line_spacing: 1.5
    first_line_indent_cm: 1.25
    alignment: justify
    hyphenation: false
  table:
    # Ячейки таблиц по ГОСТу 7.32 / Р 2.105 — кегль 12 pt (на 2 меньше body),
    # одинарный интервал, без красной строки и без интервалов между параграфами.
    cell_font: Times New Roman
    cell_size_pt: 12.0
    cell_line_spacing: 1.0
    cell_first_line_indent_cm: 0.0
    cell_space_before_pt: 0.0
    cell_space_after_pt: 0.0
    cell_alignment: left
    header_alignment: center
    header_bold: true
    # Сквозная нумерация: «Таблица 1», «Таблица 2», ... . Переключить
    # на «по главам» (Таблица 1.1, 1.2, 2.1) — `numbering: by_chapter`.
    # В приложениях нумерация всегда буквенная (А.1, Б.1) независимо
    # от режима.
    numbering: continuous
    # ГОСТ 7.32: шапка таблицы повторяется на continuation-страницах.
    repeat_header: true
    # «Продолжение таблицы N» как первая строка таблицы (по ГОСТ 7.32 —
    # обязательно при переносе на следующую страницу). Чисто-OOXML
    # способа показывать строку только на 2+ странице нет, поэтому на
    # page 1 она показывается тоже, рядом с обычной подписью «Таблица
    # N — Title» над таблицей. Это компромисс — отключить можно через
    # редактор профиля, если кафедра не требует.
    continuation_caption: true
    caption:
      alignment: left
      position: above
      format: "Таблица {num} — {title}"
      keep_with_next: true
  figure:
    alignment: center
    max_width_cm: 16.5
    # Высота ограничена 22 см, чтобы подпись не съезжала на следующую
    # страницу (A4 минус поля минус место под подпись).
    max_height_cm: 22.0
    # «По умолчанию сквозная. Переключите на by_chapter для
    # «Рисунок 1.1, 1.2, 2.1». В приложениях — всегда буквенно.
    numbering: continuous
    keep_with_next: true
    caption:
      alignment: center
      position: below
      format: "Рисунок {num} — {title}"
      keep_with_next: true
  extra:
    caption_size_pt: 12
    footnote_size_pt: 10
    heading_1:
      font: Times New Roman
      size_pt: 14
      bold: true
      uppercase: true
      alignment: center
      spacing_before_pt: 18
      spacing_after_pt: 12
      page_break_before: true
    heading_2:
      font: Times New Roman
      size_pt: 14
      bold: true
      uppercase: false
      alignment: left
      first_line_indent_cm: 1.25
      spacing_before_pt: 12
      spacing_after_pt: 6
    figure_caption:
      position: below
      format: "Рисунок {num} — {title}"
      alignment: center
      size_pt: 12
    table_caption:
      position: above
      format: "Таблица {num} — {title}"
      alignment: left
      size_pt: 12

sections_template:
  - name: Титульный лист
    type: title
    page_numbering:
      visible: false

  - name: Задание и реферат
    type: frontmatter
    page_numbering:
      visible: false

  - name: Содержание и список сокращений
    type: frontmatter
    page_numbering:
      visible: true
      format: arabic
      start_mode: start_at
      start_value: 3
    footer:
      default:
        center: "{page}"

  - name: Основная часть
    type: main
    page_numbering:
      visible: true
      format: arabic
      start_mode: continue
    footer:
      default:
        center: "{page}"

  - name: Приложения
    type: appendix
    page_numbering:
      visible: true
      format: arabic
      start_mode: continue
    header:
      default:
        center: "ПРИЛОЖЕНИЕ {appendix_letter}"
    footer:
      default:
        center: "{page}"

checks:
  F.01: {enabled: true}
  F.02: {enabled: true, params: {paper: A4}}
  F.03: {enabled: true, params: {orientation: portrait}}
  F.04: {enabled: true, params: {position: bottom_center}}
  F.05: {enabled: true, params: {format: arabic}}
  F.06: {enabled: true, params: {start_value: 3}}
  # F.07 — рамка листа (ЕСКД). Для отчётов 7.32 рамка не требуется
  # (styles.page.border отсутствует), поэтому проверка фактически
  # бездействует; включена для единообразия с профилями ЕСКД.
  F.07: {enabled: true}
  # F.08 — основная надпись (штамп ЕСКД). Бездействует, пока
  # styles.page.title_block не включён (для отчётов 7.32 штампа нет).
  F.08: {enabled: true}
  T.01: {enabled: true, params: {font: "Times New Roman"}}
  T.02: {enabled: true, params: {body_size: 14, caption_size: 12, footnote_size: 10}}
  T.03: {enabled: true, params: {line_spacing: 1.5}}
  T.04: {enabled: true, params: {first_line_indent_cm: 1.25}}
  T.05: {enabled: true, params: {alignment: justify}}
  T.06: {enabled: true}
  T.07: {enabled: true, params: {max_consecutive_empty: 1}}
  T.08: {enabled: true}
  T.09: {enabled: true}
  T.10: {enabled: true, params: {allow_inch_marker: false}}
  T.11: {enabled: true}
  T.12: {enabled: true}
  T.13: {enabled: true}
  T.14: {enabled: true}
  S.01: {enabled: true}
  S.02: {enabled: true}
  S.03: {enabled: true}
  S.04:
