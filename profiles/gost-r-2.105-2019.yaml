# ГОСТ Р 2.105-2019 — Общие требования к текстовым документам ЕСКД.
# Применим к пояснительным запискам, техническим описаниям, инструкциям,
# методическим материалам — текстовая часть конструкторской документации.
#
# Отличия от ГОСТ 7.32-2017 (отчёт о НИР):
# - Поля: 20 / 10 / 20 / 20 мм (более узкое поле справа)
# - Кегль допускается 12 при большом объёме (мы оставляем 14 по умолчанию)
# - Нумерация — со страницы 2 (после титула)
# - Структурные элементы: «Содержание» вместо «Реферат»
# - Допускается шрифт Arial (но не одновременно с TNR в одном документе)

id: gost-r-2.105-2019
name: ГОСТ Р 2.105-2019 (ЕСКД, текстовые документы)
version: "1.0"
extends: gost-7.32-2017
based_on:
  - "ГОСТ Р 2.105-2019"
  - "ГОСТ Р 7.0.100-2018"
effective_from: "2020-07-01"
description: |
  Профиль для пояснительных записок, технических описаний и инструкций
  ЕСКД. Наследует базовый ГОСТ 7.32-2017 и переопределяет геометрию
  страницы, обязательные разделы и стартовую страницу нумерации.

styles:
  page:
    margins_mm:
      top: 20
      right: 10
      bottom: 20
      left: 20

checks:
  # Поля переопределены под ЕСКД (10 мм правое поле).
  F.01:
    enabled: true

  # Нумерация со страницы 2 (после титульного листа).
  F.06:
    enabled: true
    params:
      start_value: 2

  # Обязательные разделы по ЕСКД: «Содержание» обязательно, «Реферат» — нет.
  S.01:
    enabled: true
    params:
      required_headings:
        - Содержание
        - Введение
        - Заключение
        - Список использованных источников

  # ЕСКД допускает «Литература» как сокращение от «Список использованных
  # источников» — алиасы наследуются от родителя автоматически.

  # ЕСКД более снисходителен к web-источникам (часто ссылки на сайты
  # производителей и стандарты).
  R.04:
    enabled: true
    params:
      min_length: 15
      require_year: true
      require_final_dot: true
      require_separator: true
      require_url_marker_for_web: false
